name: node-provider-proxy Dependency Audit
on:
  push:
    paths:
      - 'node-provider-proxy/**'
      # node-provider-proxy consumes the shared workspace libraries that
      # live under c3-api/lib (fallible, json-rpc, well-known-*).
      - 'c3-api/lib/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/audit-node-provider-proxy.yaml'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit (high/critical must pass)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The repo-root lockfile covers the shared workspace libraries
      # (c3-api/lib/*) that node-provider-proxy builds against.
      - name: Audit shared workspace libraries
        run: npm audit --audit-level=high

      - name: Audit node-provider-proxy
        working-directory: node-provider-proxy
        run: npm audit --audit-level=high
